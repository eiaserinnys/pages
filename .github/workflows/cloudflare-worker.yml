name: Deploy Cloudflare Worker

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/cloudflare-worker.yml"
      - "migrations/**"
      - "package.json"
      - "package-lock.json"
      - "src/worker.mjs"
      - "wrangler.toml"
  workflow_dispatch:
    inputs:
      apply_d1_migrations:
        description: "Apply D1 migrations before deploying"
        required: true
        default: false
        type: boolean

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      WRANGLER_SEND_METRICS: "false"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - run: npm test

      - run: npm run worker:check

      - name: Stop automatic deploy when migrations changed
        if: github.event_name == 'push'
        run: |
          set -eu
          if git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" | grep -q '^migrations/'; then
            echo "D1 migration files changed. Run this workflow manually with apply_d1_migrations=true."
            exit 1
          fi

      - name: Apply D1 migrations
        if: github.event_name == 'workflow_dispatch' && inputs.apply_d1_migrations
        run: npm run worker:migrate:d1

      - run: npm run worker:dry-run

      - run: npx --yes wrangler@4.86.0 deploy
